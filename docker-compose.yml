version: '3.8'

services:
  taxila-bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: taxila-notification-bot
    restart: always
    
    # Environment variables (use .env file in production)
    environment:
      TAXILA_USERNAME: ${TAXILA_USERNAME}
      TAXILA_PASSWORD: ${TAXILA_PASSWORD}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID}
      CHECK_INTERVAL_MINUTES: ${CHECK_INTERVAL_MINUTES:-10}
      HEADLESS_MODE: "true"
      DATA_DIRECTORY: /app/data
    
    # Volume mounts for persistence and logging
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    
    # Resource limits
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M
    
    # Logging configuration
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        labels: "com.taxilabot=notification-bot"
    
    # Health check
    healthcheck:
      test: ["CMD", "pgrep", "-f", "taxila-notification-bot"]
      interval: 300s
      timeout: 30s
      retries: 3
      start_period: 30s

# Optional: Add monitoring service (Prometheus/Grafana)
# monitoring:
#   image: prom/prometheus
#   ports:
#     - "9090:9090"
#   volumes:
#     - ./prometheus.yml:/etc/prometheus/prometheus.yml

# Volumes for data persistence
volumes:
  data:
  logs:
