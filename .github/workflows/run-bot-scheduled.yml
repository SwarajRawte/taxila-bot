name: Run Taxila Notification Bot

on:
  schedule:
    # Run daily at 9 AM UTC (free tier friendly)
    - cron: '0 9 * * *'
  workflow_dispatch:  # Allow manual trigger
  
jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up JDK 25
      uses: actions/setup-java@v3
      with:
        java-version: '25'
        distribution: 'temurin'
        cache: maven
    
    - name: Install Chrome
      run: |
        sudo apt-get update
        sudo apt-get install -y chromium-browser
    
    - name: Build project
      run: mvn clean package -q
    
    - name: Run bot check
      env:
        TAXILA_USERNAME: ${{ secrets.TAXILA_USERNAME }}
        TAXILA_PASSWORD: ${{ secrets.TAXILA_PASSWORD }}
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: |
        timeout 300 java -jar target/taxila-notification-bot-1.0.0.jar || true
    
    - name: Send status to Telegram
      if: always()
      run: |
        if [ "${{ job.status }}" == "success" ]; then
          curl -X POST https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage \
            -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d "text=✅ Taxila bot check completed successfully on GitHub Actions" \
            -d "parse_mode=HTML"
        else
          curl -X POST https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage \
            -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d "text=⚠️ Taxila bot check had issues - check GitHub Actions logs" \
            -d "parse_mode=HTML"
        fi
