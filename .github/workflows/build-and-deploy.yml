name: Build and Deploy Taxila Bot

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3
    
    - name: Set up JDK 11
      uses: actions/setup-java@v3
      with:
        java-version: '11'
        distribution: 'temurin'
        cache: maven

    - name: Build with Maven
      run: mvn clean package -q

    - name: Test bot configuration
      run: |
        echo "Bot built successfully!"
        ls -lh target/*.jar
        
    - name: Upload JAR artifact
      uses: actions/upload-artifact@v3
      with:
        name: taxila-notification-bot
        path: target/taxila-notification-bot-1.0.0.jar
        retention-days: 30

  notify-build-status:
    runs-on: ubuntu-latest
    needs: build
    if: always()
    
    steps:
    - name: Send Telegram notification
      if: success()
      run: |
        curl -X POST https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage \
          -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
          -d "text=✅ Taxila Bot build successful on GitHub Actions!" \
          -d "parse_mode=HTML"
          
    - name: Send failure notification
      if: failure()
      run: |
        curl -X POST https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage \
          -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
          -d "text=❌ Taxila Bot build FAILED on GitHub Actions" \
          -d "parse_mode=HTML"
